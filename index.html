<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="heading">My Board</h1>

  <div class="board">

    <div class="column">
      <h2>🔴 To Do</h2>

      <div class="tasks">

      </div>

      <button class="add-btn">+ Add</button>
    </div>

    <div class="column">
      <h2>🟡 Doing</h2>

      <div class="tasks">

      </div>

      <button class="add-btn">+ Add</button>
    </div>

    <div class="column">
      <h2>🟢 Done</h2>

      <div class="tasks">

      </div>

      <button class="add-btn">+ Add</button>
    </div>

  </div>

</body>

<style src="script.js"></style>
</html>
