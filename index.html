<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="heading">My Board</h1>

  <div class="board">

    <div class="column">
      <h2>🔴 To Do</h2>

      <div class="tasks">

      </div>

      <button class="add-btn">+ Add</button>
    </div>

    <div class="column">
      <h2>🟡 Doing</h2>

      <div class="tasks">

      </div>

      <button class="add-btn">+ Add</button>
    </div>

    <div class="column">
      <h2>🟢 Done</h2>

      <div class="tasks">

      </div>

      <button class="add-btn">+ Add</button>
    </div>

  </div>

<div class="overlay hidden"></div>

<div class="modal hidden">

    <h2>Add New Task</h2>

    <input
        type="text"
        placeholder="Task title"
        class="task-title">
    <p class="error"></p>

    <textarea
        placeholder="Description"
        class="task-description"></textarea>

    <select class="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <input
        type="date"
        class="due-date">

    <div class="buttons">

        <button class="cancel-btn">
            Cancel
        </button>

        <button class="create-btn">
            Create Task
        </button>

    </div>

</div>

</body>

<script src="script.js"></script>
</html>
